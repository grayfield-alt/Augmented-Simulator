<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Augmented Simulator - Portrait</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@500;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-[#050507] text-white overflow-hidden flex justify-center">
    <div id="game-container"
        class="w-full max-w-[412px] h-full max-h-[850px] aspect-[9/18] m-auto flex flex-col bg-black relative shadow-2xl overflow-hidden">
        <!-- Battle Screen -->
        <div id="battle-screen" class="hidden flex-col h-full bg-[#050507]">
            <header id="top-status" class="p-4 flex justify-between items-center bg-black/40 backdrop-blur-md z-30">
                <div class="flex gap-4 font-mono text-xs italic tracking-tighter uppercase opacity-80">
                    <div>HP <span id="p-hp" class="text-white font-bold">0</span></div>
                    <div>ATK <span id="p-atk" class="text-white font-bold">0</span></div>
                    <div>DEF <span id="p-def" class="text-white font-bold">0</span></div>
                    <div>AP <span id="p-ap" class="text-white font-bold">0</span></div>
                </div>
                <div id="turn-indicator-overlay" class="text-[10px] font-black italic uppercase tracking-[0.2em]"></div>
            </header>
            <main id="play-area" class="flex-1 relative overflow-hidden bg-black/20">
                <canvas id="gameCanvas" class="absolute inset-0 w-full h-full z-10"></canvas>
                <div id="visual-overlays" class="absolute inset-0 pointer-events-none z-20">
                    <div id="msg-container"
                        class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center w-full">
                        <div id="message"></div>
                    </div>
                </div>
            </main>
            <footer id="bottom-ui"
                class="absolute bottom-0 w-full z-30 pb-[env(safe-area-inset-bottom,20px)] p-4 flex flex-col gap-3">
                <!-- HP / AP Status HUD -->
                <div class="glass-panel w-full p-4 rounded-2xl flex justify-between items-center">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-white/60 font-bold uppercase tracking-widest">Health</span>
                        <div class="flex items-baseline gap-1">
                            <span id="p-hp" class="text-3xl font-black italic text-[#4ade80]">100</span>
                            <span class="text-sm font-bold text-white/40">/ 100</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] text-white/60 font-bold uppercase tracking-widest">Action Points</span>
                        <div class="flex items-baseline gap-1">
                            <span id="p-ap" class="text-3xl font-black italic text-[#4a9eff]">0</span>
                            <span class="text-sm font-bold text-white/40">/ 10</span>
                        </div>
                    </div>
                </div>

                <!-- PLAYER TURN CONTROLS -->
                <div id="player-controls"
                    class="grid grid-cols-3 gap-3 max-w-[412px] mx-auto w-full transition-all duration-300">
                    <button id="btn-skill-atk"
                        class="glass-btn p-4 flex flex-col items-center justify-center min-h-[64px]">
                        <span class="text-lg font-black italic text-white">ATK</span>
                        <span class="text-[11px] text-[#4a9eff] font-bold mt-1">2 AP</span>
                    </button>
                    <button id="btn-skill-spin"
                        class="glass-btn p-4 flex flex-col items-center justify-center min-h-[64px]">
                        <span class="text-lg font-black italic text-white">SPIN</span>
                        <span class="text-[11px] text-[#4a9eff] font-bold mt-1">3 AP</span>
                    </button>
                    <button id="btn-skill-heavy"
                        class="glass-btn p-4 flex flex-col items-center justify-center min-h-[64px]">
                        <span class="text-lg font-black italic text-[#ff4a4a]">HEAVY</span>
                        <span class="text-[11px] text-[#4a9eff] font-bold mt-1">5 AP</span>
                    </button>
                </div>

                <!-- MONSTER TURN CONTROLS -->
                <div id="monster-controls"
                    class="hidden grid-cols-2 gap-3 max-w-[412px] mx-auto w-full transition-all duration-300">
                    <button id="btn-dodge"
                        class="glass-btn p-4 flex flex-col items-center justify-center min-h-[80px] bg-[#050507]/60 border-[#88ccff]/30">
                        <span class="text-xl font-black italic text-[#88ccff]">DODGE</span>
                        <span class="text-[11px] text-white/50 font-bold mt-1">EVADE HIT</span>
                    </button>
                    <button id="btn-parry"
                        class="glass-btn p-4 flex flex-col items-center justify-center min-h-[80px] bg-[#050507]/60 border-[#FFD700]/30">
                        <span class="text-xl font-black italic text-[#FFD700]">PARRY</span>
                        <span class="text-[11px] text-white/50 font-bold mt-1">BLOCK & AP</span>
                    </button>
                </div>
            </footer>
        </div>

        <!-- Overlays -->
        <div id="lobby-overlay"
            class="fixed inset-0 bg-[#050507]/95 backdrop-blur-2xl z-[200] flex flex-col items-center justify-center p-8 text-center transition-all duration-500">
            <h1 class="text-6xl font-black italic text-white font-title tracking-tighter uppercase mb-2 leading-none">
                AUGMENTED<br /><span class="text-[#fae133]">SIMULATOR</span>
            </h1>
            <button id="btn-start"
                class="w-full max-w-[280px] bg-[#fae133] hover:bg-[#fae133]/80 p-6 rounded-[2rem] font-black text-black text-xl italic uppercase tracking-widest transition-all active:scale-95 shadow-2xl mt-12">
                Start Operation
            </button>
            <div class="grid grid-cols-2 gap-4 mt-6 w-full max-w-[280px]">
                <button id="btn-archive"
                    class="bg-white/5 border border-white/5 p-4 rounded-2xl flex flex-col items-center gap-2">Archive</button>
                <button id="btn-briefing"
                    class="bg-white/5 border border-white/5 p-4 rounded-2xl flex flex-col items-center gap-2">Briefing</button>
            </div>
        </div>

        <div id="augment-overlay"
            class="hidden fixed inset-0 bg-[#050507]/80 backdrop-blur-xl z-[300] flex flex-col items-center justify-center p-8">
        </div>
        <div id="event-overlay"
            class="hidden fixed inset-0 bg-[#050507]/80 backdrop-blur-xl z-[300] flex flex-col items-center justify-center p-8">
        </div>
        <div id="inventory-overlay"
            class="hidden fixed inset-0 bg-[#050507]/90 backdrop-blur-3xl z-[400] flex flex-col items-center justify-center p-6">
        </div>
        <div id="guide-overlay"
            class="hidden fixed inset-0 bg-[#050507]/90 backdrop-blur-3xl z-[500] flex flex-col items-center justify-center p-8">
        </div>
        <div id="game-over-overlay"
            class="hidden fixed inset-0 bg-[#050507]/90 backdrop-blur-3xl z-[500] flex flex-col items-center justify-center p-8 text-center">
        </div>
        <div id="error-overlay"
            class="hidden fixed inset-0 bg-red-900/90 backdrop-blur-3xl z-[9999] flex flex-col items-center justify-center p-12 text-white font-mono text-xs overflow-auto">
        </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
</body>

</html>
