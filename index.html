<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Augmented Simulator</title>
</head>
<body class="bg-background text-white font-sans overflow-hidden h-screen w-screen flex justify-center">
  <div id="game-container" class="w-full max-w-[412px] h-full max-h-[850px] aspect-[9/18] m-auto flex flex-col bg-background relative shadow-2xl overflow-hidden">
    <!-- 1. HUD (Top Status) -->
    <header id="top-status" class="flex-none h-[70px] px-6 bg-surface/80 backdrop-blur-xl border-b border-white/5 flex justify-between items-center z-[100] transition-opacity duration-300">
      <div class="flex gap-6">
        <div class="flex flex-col">
          <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none mb-1">Vitality</span>
          <span id="p-hp" class="text-xl font-black text-danger font-title">100</span>
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none mb-1">Power</span>
          <span id="p-atk" class="text-xl font-black text-primary font-title">50</span>
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none mb-1">Defense</span>
          <span id="p-def" class="text-xl font-black text-info font-title">0</span>
        </div>
      </div>
    </header>

    <!-- 2. Play Area (Canvas) -->
    <main id="play-area" class="flex-1 relative overflow-hidden bg-black/20">
      <div id="app" class="h-full w-full"></div>
      <div id="msg-container" class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center w-full pointer-events-none z-20">
        <div id="message" class="text-5xl font-black italic text-white font-title drop-shadow-[0_10px_30px_rgba(0,0,0,0.8)] opacity-0 transition-all duration-300 uppercase tracking-tighter"></div>
      </div>
    </main>

    <!-- 3. Footer Control Area -->
    <footer id="bottom-ui" class="flex-none h-[280px] px-8 py-6 bg-surface border-t-2 border-primary/20 z-[100] transition-opacity duration-300 overflow-hidden relative">
      <div class="flex flex-col h-full justify-between items-center max-w-sm mx-auto">
        <div class="flex items-center gap-4 px-6 py-2 bg-white/5 rounded-2xl border border-white/5 mb-4">
          <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">AP</span>
          <span id="p-ap" class="text-3xl font-black text-primary font-title">0</span>
        </div>

        <div id="player-actions" class="w-full flex flex-col gap-3">
          <div class="flex gap-3">
            <button id="btn-atk" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 p-4 rounded-2xl flex flex-col items-center gap-1 transition-all active:scale-95 disabled:opacity-20">
              <span class="text-sm font-black text-white uppercase">ATTACK</span>
              <span class="text-[9px] font-bold text-slate-500 uppercase">2 AP</span>
            </button>
            <button id="btn-spin" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 p-4 rounded-2xl flex flex-col items-center gap-1 transition-all active:scale-95 disabled:opacity-20 text-secondary">
              <span class="text-sm font-black uppercase">SPIN</span>
              <span class="text-[9px] font-bold opacity-60 uppercase">3 AP</span>
            </button>
          </div>
          <button id="btn-heavy" class="w-full bg-primary hover:bg-primary/80 p-5 rounded-2xl font-black text-background text-lg uppercase transition-all active:scale-98 shadow-xl mt-2">
            HEAVY STRIKE <span class="text-[10px] ml-2 opacity-60">5 AP</span>
          </button>
        </div>
      </div>
    </footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
