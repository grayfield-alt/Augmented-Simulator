name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Tests
        run: npm run test --if-present

      - name: 🏗️ Build Project
        run: npm run build
        # Vite build: copies public/ → dist/ (includes public/proto2.html unmodified)

      - name: 🔍 Smoke Check (DOM Integrity Validation)
        # 필수 DOM 요소가 없으면 배포 즉시 중단
        run: node scripts/smoke-check.js

      - name: 🚀 Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "ci: auto-deploy from ${{ github.sha }}"
