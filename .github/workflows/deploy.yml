name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 Smoke Check - Validate source game HTML integrity
        # 배포 전 소스 파일(public/proto2.html)에 핵심 DOM이 있는지 검증
        run: |
          echo "Checking required DOM elements in public/proto2.html..."
          for id in game-container play-area bottom-ui gameCanvas lobby-overlay; do
            if grep -q "id=\"${id}\"\|id='${id}'" public/proto2.html; then
              echo "  ✅ #${id} found"
            else
              echo "  ❌ MISSING: #${id}"
              echo "SMOKE CHECK FAILED: required element #${id} is missing from public/proto2.html"
              exit 1
            fi
          done
          echo "✅ All required DOM elements verified in source."

      - name: 📁 Prepare Deploy Directory
        run: |
          mkdir -p _deploy
          # [핵심] 실제 게임 본체는 index.html이 됨
          cp public/proto2.html _deploy/index.html
          # [핵심] 기존 URL 호환성을 위해 proto2.html은 index.html로 리다이렉트만 수행
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=index.html"><title>Redirecting...</title></head><body>Redirecting to index.html...</body></html>' > _deploy/proto2.html
          echo "Deploy directory contents:"
          ls -la _deploy/

      - name: 🔍 Final Smoke Check - Test deployed index.html
        run: |
          echo "Verifying deployed index.html (the game)..."
          if grep -q "id=\"game-container\"" _deploy/index.html; then
             echo "  ✅ game-container exists in deployment entry point."
          else
             echo "  ❌ FAILED: deployment entry point is broken!"
             exit 1
          fi

      - name: 🚀 Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "ci: deploy game as index.html from ${{ github.sha }}"
