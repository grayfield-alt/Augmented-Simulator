<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AUGMENTED SIMULATOR V3 (LOCAL/STANDALONE)</title>
    <!-- CSS Inlined for Local Execution -->
    <style>
        :root {
            --font-main: 'Inter', sans-serif;
            --primary: #FFD700;
            --danger: #FF4444;
            --bg-dark: #0a0a0a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            flex: 0 0 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            border-bottom: 1px solid #333;
        }

        .status-group {
            display: flex;
            gap: 1.5rem;
        }

        .status-item {
            display: flex;
            flex-direction: column;
        }

        .status-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #888;
            font-weight: 700;
        }

        .status-value {
            font-size: 1.25rem;
            font-weight: 900;
        }

        main {
            flex: 1 1 auto;
            position: relative;
            background: #000;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        footer {
            flex: 0 0 auto;
            padding: 1rem;
            background: #111;
            border-top: 1px solid #333;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-row {
            display: flex;
            gap: 0.75rem;
        }

        button {
            flex: 1;
            min-height: 3rem;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-secondary {
            background: #333;
            color: #fff;
        }

        .btn-wide {
            width: 100%;
        }

        #turn-indicator {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 900;
            letter-spacing: 2px;
            pointer-events: none;
        }

        #message {
            position: absolute;
            top: 40%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2rem;
            font-weight: 900;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .fade-in {
            opacity: 1 !important;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <header id="top-status">
            <div class="status-group">
                <div class="status-item"><span class="status-label">Vitality</span><span id="p-hp"
                        class="status-value hp-text">100</span></div>
                <div class="status-item"><span class="status-label">Power</span><span id="p-atk"
                        class="status-value atk-text">50</span></div>
                <div class="status-item"><span class="status-label">Defense</span><span id="p-def"
                        class="status-value def-text">0</span></div>
            </div>
        </header>
        <main id="play-area">
            <canvas id="gameCanvas"></canvas>
            <div id="visual-overlays">
                <div id="msg-container">
                    <div id="message"></div>
                </div>
                <div id="turn-indicator">Player's Turn</div>
            </div>
        </main>
        <footer id="bottom-ui">
            <div class="ap-wrapper"><span class="ap-label">ENERGY</span> <span id="p-ap" class="ap-text">0</span></div>
            <div id="player-actions" class="btn-stack">
                <div class="btn-row">
                    <button class="btn-primary" onclick="handleGameAction('atk')">🗡️ 공격 (2)</button>
                    <button class="btn-secondary" onclick="handleGameAction('spin')">🌀 회전 베기 (3)</button>
                </div>
                <button class="btn-primary btn-wide" onclick="handleGameAction('heavy')">💥 강력한 강타 (5)</button>
                <button class="btn-secondary btn-wide" style="opacity: 0.5;" onclick="handleGameAction('end')">턴
                    종료</button>
            </div>
        </footer>
    </div>

    <!-- Standalone Game Engine Script (Bundled for Local Access) -->
    <script>
        (function () {
            // --- 1. CORE LOGIC ---
            const GameStore = {
                state: { player: { hp: 100, maxHp: 100, atk: 50, def: 0, ap: 0, parryTimer: 0, dashTimer: 0, isParrying: false }, monsters: [], currentTurn: 'MONSTER', round: 1, gameStarted: false },
                subscribe(l) { this.listener = l; },
                setState(s) { this.state = { ...this.state, ...s }; if (this.listener) this.listener(this.state); }
            };

            class Monster {
                constructor(name, hp, atk) {
                    this.name = name; this.hp = hp; this.maxHp = hp; this.atk = atk;
                    this.state = 'IDLE'; this.timer = 0; this.x = 0; this.y = 0;
                }
                update() {
                    if (this.timer > 0) this.timer--;
                    if (this.state === 'TELEGRAPH' && this.timer <= 0) { this.state = 'ATTACK'; this.timer = 5; }
                    else if (this.state === 'ATTACK' && this.timer <= 0) { this.state = 'IDLE'; this.timer = 60; }
                }
                startAttack() { this.state = 'TELEGRAPH'; this.timer = 60; }
            }

            // --- 2. UI LOGIC ---
            class Renderer {
                constructor() { this.canvas = document.getElementById('gameCanvas'); this.ctx = this.canvas.getContext('2d'); }
                resize() { const r = document.getElementById('play-area').getBoundingClientRect(); this.canvas.width = r.width; this.canvas.height = r.height; }
                draw(state) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    // Draw Player
                    this.ctx.fillStyle = state.player.parryTimer > 0 ? "#FFD700" : "#FFF";
                    this.ctx.beginPath(); this.ctx.arc(this.canvas.width / 2, this.canvas.height * 0.75, 25, 0, 7); this.ctx.fill();
                    // Draw Monsters
                    state.monsters.forEach(m => {
                        this.ctx.fillStyle = m.state === 'TELEGRAPH' ? "#ff9800" : (m.state === 'ATTACK' ? "#f44336" : "#fff");
                        this.ctx.fillRect(m.x - 30, m.y - 30, 60, 60);
                    });
                }
            }

            const renderer = new Renderer();
            const uiElements = { hp: document.getElementById('p-hp'), ap: document.getElementById('p-ap'), msg: document.getElementById('message'), turn: document.getElementById('turn-indicator') };

            function updateUI(state) {
                uiElements.hp.textContent = Math.ceil(state.player.hp);
                uiElements.ap.textContent = state.player.ap;
                uiElements.turn.textContent = state.currentTurn === 'PLAYER' ? "Player's Turn" : "Monster's Turn";
                uiElements.turn.style.color = state.currentTurn === 'PLAYER' ? "#FFF" : "#ff4444";
            }

            // --- 3. SYSTEM INIT ---
            window.addEventListener('resize', () => renderer.resize());
            renderer.resize();

            window.handleGameAction = (action) => {
                const s = GameStore.state;
                if (s.currentTurn !== 'PLAYER') return;
                if (action === 'end') GameStore.setState({ currentTurn: 'MONSTER' });
                else {
                    const target = s.monsters[0];
                    if (!target) return;
                    if (action === 'atk' && s.player.ap >= 2) { target.hp -= 20; GameStore.setState({ player: { ...s.player, ap: s.player.ap - 2 } }); showMessage("ATTACK!"); }
                }
                if (s.monsters.every(m => m.hp <= 0)) { showMessage("WAVE CLEAR!"); setTimeout(() => spawnWave(s.round + 1), 1000); }
            };

            function showMessage(txt) { uiElements.msg.textContent = txt; uiElements.msg.classList.add('fade-in'); setTimeout(() => uiElements.msg.classList.remove('fade-in'), 500); }

            function spawnWave(r) {
                const ms = [new Monster("Enemy", 100, 10)];
                ms[0].x = renderer.canvas.width / 2; ms[0].y = renderer.canvas.height * 0.25;
                GameStore.setState({ monsters: ms, round: r, currentTurn: 'MONSTER' });
            }

            function gameLoop() {
                const s = GameStore.state;
                const p = s.player;
                if (p.parryTimer > 0) p.parryTimer--;
                s.monsters.forEach(m => {
                    m.update();
                    if (s.currentTurn === 'MONSTER' && m.state === 'IDLE' && Math.random() < 0.01) m.startAttack();
                    if (m.state === 'ATTACK' && m.timer === 1) {
                        if (p.parryTimer <= 0) { p.hp -= m.atk; showMessage("HIT!"); }
                        else showMessage("PARRY!");
                    }
                });
                renderer.draw(s);
                updateUI(s);
                requestAnimationFrame(gameLoop);
            }

            // Input
            renderer.canvas.addEventListener('mousedown', (e) => {
                if (GameStore.state.currentTurn === 'MONSTER') {
                    if (e.button === 0) GameStore.setState({ player: { ...GameStore.state.player, parryTimer: 20 } });
                }
            });

            GameStore.subscribe(updateUI);
            spawnWave(1);
            GameStore.setState({ gameStarted: true });
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>

</html>
